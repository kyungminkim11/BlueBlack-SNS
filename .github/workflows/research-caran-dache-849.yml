name: Research Caran d'Ache 849

on:
  push:
    paths:
      - '.github/workflows/research-caran-dache-849.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install parsers
        run: python -m pip install requests beautifulsoup4 lxml
      - name: Fetch official and BlueBlack data
        run: |
          python - <<'PY'
          import json, re, requests
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone
          from urllib.parse import urljoin

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/126 Safari/537.36',
              'Accept-Language': 'ko-KR,ko;q=0.9,en;q=0.8'
          }

          candidates = [
              'https://www.carandache.com/ch/en/849-ballpoint-s-1116.htm',
              'https://www.carandache.com/ch/en/849-s-1094.htm',
              'https://www.carandache.com/us/en/849-ballpoint-s-1116.htm',
              'https://www.carandache.com/us/en/849-s-1094.htm',
              'https://www.carandache.com/ch/en/instruments-writing/849-ballpoint-pen-black-p-10842.htm',
              'https://www.carandache.com/ch/en/instruments-writing/849-ballpoint-pen-white-p-10843.htm',
              'https://www.carandache.com/ch/en/ballpoint-refills/goliath-ballpoint-refill-black-medium-p-11115.htm',
              'https://www.carandache.com/ch/en/la-maison/history-s-1097.htm'
          ]

          blueblack_candidates = [
              'https://blueblack.co.kr/product/search.html?keyword=849',
              'https://blueblack.co.kr/product/list.html?cate_no=58',
              'https://blueblack.co.kr/category/%EA%B9%8C%EB%A0%8C%EB%8B%A4%EC%89%AC/58/'
          ]

          def clean_text(soup):
              for node in soup.select('script,style,noscript,svg'):
                  node.decompose()
              return re.sub(r'\n{3,}', '\n\n', '\n'.join(x.strip() for x in soup.get_text('\n').splitlines() if x.strip()))

          pages = []
          for url in candidates + blueblack_candidates:
              item = {'url': url}
              try:
                  response = requests.get(url, headers=headers, timeout=35, allow_redirects=True)
                  item['status'] = response.status_code
                  item['final_url'] = response.url
                  item['content_type'] = response.headers.get('content-type', '')
                  item['length'] = len(response.text)
                  soup = BeautifulSoup(response.text, 'lxml')
                  item['title'] = soup.title.get_text(' ', strip=True) if soup.title else ''
                  item['text'] = clean_text(soup)[:30000]
                  item['links'] = [
                      {'text': a.get_text(' ', strip=True)[:120], 'url': urljoin(response.url, a.get('href'))}
                      for a in soup.find_all('a', href=True)
                      if any(k in (a.get_text(' ', strip=True) + ' ' + a.get('href', '')).lower() for k in ['849','goliath','instagram','caran'])
                  ][:100]
                  item['images'] = [
                      urljoin(response.url, img.get('data-src') or img.get('data-lazy-src') or img.get('src'))
                      for img in soup.find_all('img')
                      if (img.get('data-src') or img.get('data-lazy-src') or img.get('src'))
                  ][:100]
              except Exception as error:
                  item['error'] = f'{type(error).__name__}: {error}'
              pages.append(item)

          # Parse likely BlueBlack product cards and 849 product links.
          products = []
          seen = set()
          for page in pages:
              if 'blueblack.co.kr' not in page.get('final_url', page.get('url', '')) or not page.get('text'):
                  continue
              try:
                  response = requests.get(page['final_url'], headers=headers, timeout=35)
                  soup = BeautifulSoup(response.text, 'lxml')
                  for a in soup.find_all('a', href=True):
                      text = a.get_text(' ', strip=True)
                      href = urljoin(response.url, a['href'])
                      hay = f'{text} {href}'.lower()
                      if '849' not in hay:
                          continue
                      if href in seen:
                          continue
                      seen.add(href)
                      parent = a
                      for _ in range(5):
                          if parent.parent: parent = parent.parent
                      block = re.sub(r'\s+', ' ', parent.get_text(' ', strip=True))[:1200]
                      products.append({'name': text[:300], 'url': href, 'context': block})
              except Exception:
                  pass

          # Fetch each discovered product page for options and details.
          product_pages = []
          for product in products[:30]:
              entry = dict(product)
              try:
                  response = requests.get(product['url'], headers=headers, timeout=35)
                  soup = BeautifulSoup(response.text, 'lxml')
                  entry['status'] = response.status_code
                  entry['title'] = soup.title.get_text(' ', strip=True) if soup.title else ''
                  entry['text'] = clean_text(soup)[:30000]
                  entry['option_texts'] = [
                      re.sub(r'\s+', ' ', opt.get_text(' ', strip=True))
                      for opt in soup.select('select option, .xans-product-option option, .ec-product-button li, .xans-product-option li')
                      if opt.get_text(' ', strip=True)
                  ][:100]
                  entry['images'] = list(dict.fromkeys([
                      urljoin(response.url, img.get('data-src') or img.get('data-lazy-src') or img.get('src'))
                      for img in soup.find_all('img')
                      if (img.get('data-src') or img.get('data-lazy-src') or img.get('src'))
                  ]))[:80]
              except Exception as error:
                  entry['error'] = f'{type(error).__name__}: {error}'
              product_pages.append(entry)

          result = {
              'checked_at': datetime.now(timezone.utc).isoformat(),
              'pages': pages,
              'blueblack_products': product_pages
          }
          with open('caran-dache-849-research.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          PY
      - name: Commit research
        run: |
          git config user.name 'blueblack-content-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add caran-dache-849-research.json
          git diff --cached --quiet || git commit -m 'Update Caran d Ache 849 research data'
          git push
