name: Research BlueBlack Opus 88 Fast

on:
  push:
    paths:
      - '.github/workflows/research-blueblack-opus88-fast.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install requests beautifulsoup4 lxml
      - name: Extract product pages
        run: |
          python - <<'PY'
          import json,re,requests
          from bs4 import BeautifulSoup
          from urllib.parse import urljoin
          from datetime import datetime,timezone
          H={'User-Agent':'Mozilla/5.0','Accept-Language':'ko-KR,ko;q=0.9'}
          u='https://blueblack.co.kr/product/search.html?keyword=%EC%98%A4%ED%8D%BC%EC%8A%A488'
          r=requests.get(u,headers=H,timeout=30)
          s=BeautifulSoup(r.text,'lxml')
          links=[]
          for a in s.find_all('a',href=True):
            text=a.get_text(' ',strip=True)
            href=urljoin(r.url,a['href'])
            h=(text+' '+href).lower()
            if '/product/' in href and ('오퍼스88' in text or 'opus88' in h or 'opus-88' in h) and href not in [x['url'] for x in links]:
              links.append({'name':text,'url':href})
          products=[]
          for link in links:
            item=dict(link)
            try:
              p=requests.get(link['url'],headers=H,timeout=30)
              soup=BeautifulSoup(p.text,'lxml')
              for n in soup.select('script,style,noscript,svg'): n.decompose()
              text='\n'.join(x.strip() for x in soup.get_text('\n').splitlines() if x.strip())
              item['title']=soup.title.get_text(' ',strip=True) if soup.title else ''
              item['text']=text[:30000]
              item['options']=[re.sub(r'\s+',' ',x.get_text(' ',strip=True)) for x in soup.select('select option,.xans-product-option option,.ec-product-button li') if x.get_text(' ',strip=True)][:120]
              item['images']=list(dict.fromkeys([urljoin(p.url,img.get('data-src') or img.get('data-lazy-src') or img.get('src')) for img in soup.find_all('img') if (img.get('data-src') or img.get('data-lazy-src') or img.get('src'))]))[:80]
            except Exception as e:item['error']=str(e)
            products.append(item)
          open('blueblack-opus88-products.json','w',encoding='utf-8').write(json.dumps({'checked_at':datetime.now(timezone.utc).isoformat(),'search_status':r.status_code,'products':products},ensure_ascii=False,indent=2))
          PY
      - name: Commit
        run: |
          git config user.name blueblack-content-bot
          git config user.email actions@users.noreply.github.com
          git add blueblack-opus88-products.json
          git diff --cached --quiet || git commit -m 'Add BlueBlack Opus 88 product details'
          git push
