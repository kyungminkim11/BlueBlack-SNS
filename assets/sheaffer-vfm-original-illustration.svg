<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">쉐퍼 VFM 볼펜 자체 제작 참고 일러스트</title>
  <desc id="desc">현대적인 테이퍼 실루엣과 노크, 클립, 화이트 도트를 표현한 자체 제작 제품 참고 이미지</desc>
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f8f6"/>
      <stop offset="0.32" stop-color="#b8bcc0"/>
      <stop offset="0.58" stop-color="#f2f3f2"/>
      <stop offset="1" stop-color="#777c81"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8d9296"/>
      <stop offset="0.4" stop-color="#fafafa"/>
      <stop offset="0.7" stop-color="#b6babd"/>
      <stop offset="1" stop-color="#696e73"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="#f7f5ef"/>
  <ellipse cx="607" cy="730" rx="390" ry="42" fill="#24303a" opacity=".12" filter="url(#shadow)"/>
  <g transform="translate(600 440) rotate(-34)">
    <path d="M-44 360 L-20 435 L0 474 L20 435 L44 360 Z" fill="url(#metal)" stroke="#686d72" stroke-width="4"/>
    <rect x="-49" y="-294" width="98" height="662" rx="48" fill="url(#body)" stroke="#73787c" stroke-width="4"/>
    <rect x="-50" y="-44" width="100" height="18" rx="8" fill="url(#metal)" stroke="#777b7f" stroke-width="2"/>
    <rect x="-39" y="-342" width="78" height="70" rx="20" fill="url(#metal)" stroke="#70757a" stroke-width="4"/>
    <path d="M18 -258 C54 -214 66 -110 42 6 C35 39 26 48 14 47 C5 46 3 37 7 18 C28 -82 22 -179 -2 -239 Z" fill="url(#metal)" stroke="#646a70" stroke-width="4"/>
    <circle cx="18" cy="-238" r="13" fill="#fff" stroke="#969ba0" stroke-width="4"/>
    <path d="M-29 316 C-13 337 13 337 29 316" fill="none" stroke="#fff" stroke-width="5" opacity=".55"/>
  </g>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <text x="600" y="92" font-size="28" font-weight="700" fill="#293642">SHEAFFER VFM BALLPOINT</text>
    <text x="600" y="126" font-size="18" fill="#66717a">자체 제작 참고 일러스트 · 외부 사진 복제 없음</text>
    <text x="600" y="828" font-size="18" fill="#707981">실제 색상·트림·비율은 판매 제품 사진과 다를 수 있습니다.</text>
  </g>
</svg>