<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests" />
  <title>BlueBlack SNS — Internal</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <main class="login-shell" aria-labelledby="login-title">
      <section class="login-card">
        <div class="brand-mark" aria-hidden="true">BB</div>
        <p class="eyebrow">INTERNAL WORKSPACE</p>
        <h1 id="login-title">BlueBlack SNS</h1>
        <p class="login-copy">사내 일정과 제품 검수 자료를 확인하려면 로그인하세요.</p>

        <form id="login-form" class="login-form" autocomplete="off">
          <label>
            <span>아이디</span>
            <input id="username" name="username" type="text" autocomplete="username" spellcheck="false" required />
          </label>
          <label>
            <span>비밀번호</span>
            <div class="password-row">
              <input id="password" name="password" type="password" autocomplete="current-password" required />
              <button id="toggle-password" class="icon-button" type="button" aria-label="비밀번호 표시 전환">보기</button>
            </div>
          </label>
          <button id="login-button" class="primary-button" type="submit">
            <span class="button-label">로그인</span>
            <span class="spinner" hidden aria-hidden="true"></span>
          </button>
          <p id="login-message" class="form-message" role="alert" aria-live="polite"></p>
        </form>

        <div class="security-note">
          <strong>보안 안내</strong>
          <p>비밀번호는 저장되지 않으며, 입력한 인증 정보로 암호화된 자료를 브라우저 안에서만 해제합니다.</p>
        </div>
      </section>
      <p class="footer-note">Unauthorized access is prohibited.</p>
    </main>
  </div>
  <script src="./app.js" defer></script>
</body>
</html>
